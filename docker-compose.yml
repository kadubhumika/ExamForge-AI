version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assignment_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2468
      POSTGRES_DB: assignment_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: assignment_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
